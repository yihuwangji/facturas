<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f766e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="facturas-icon.svg" type="image/svg+xml">
<title>本地发票资料库</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--text:#111827;--muted:#667085;--line:#d8dee9;--brand:#0f766e;--blue:#2563eb;--green:#15803d;--red:#b42318;--amber:#b54708}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Microsoft YaHei",sans-serif}
header{background:#fff;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 18px;position:sticky;top:0;z-index:10}
header strong{font-size:18px}
main{max-width:1280px;margin:0 auto;padding:16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:14px}
.notice{background:#ecfdf3;border:1px solid #abefc6;color:#05603a;border-radius:8px;padding:12px;margin-bottom:14px}
.warn{background:#fff7e6;border-color:#fedf89;color:#7a2e0e}
.tabs{display:flex;gap:8px;margin-bottom:14px;overflow:auto;padding-bottom:2px}
.tab{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:6px;min-width:84px;height:38px;padding:0 14px;font-weight:700;cursor:pointer;white-space:nowrap}
.tab.active{background:var(--brand);border-color:var(--brand);color:#fff}
.hide{display:none!important}
.muted{color:var(--muted);font-size:13px}
label{display:block;font-size:12px;font-weight:700;margin:10px 0 5px;color:#344054}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:9px 10px;font-size:14px;background:#fff;color:var(--text)}
textarea{min-height:72px;resize:vertical}
button{border:0;border-radius:6px;min-height:36px;padding:0 12px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}
button.secondary{background:#475467}button.good{background:var(--green)}button.danger{background:var(--red)}button.light{background:#fff;color:var(--text);border:1px solid var(--line)}
button:disabled{opacity:.6;cursor:not-allowed}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.wide{grid-column:span 2}.full{grid-column:1/-1}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px}.card .label{color:var(--muted);font-size:12px;font-weight:700}.card .value{font-size:24px;font-weight:800;margin-top:6px}
.filters{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:12px}
.item{border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px;background:#fff}
.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.name{font-weight:800}.raw{white-space:pre-wrap;max-height:160px;overflow:auto;background:#fbfcfe;border:1px solid var(--line);border-radius:6px;padding:10px;font-size:12px;color:#344054}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid var(--line);padding:8px;font-size:13px;text-align:left;vertical-align:top}
th{background:#f2f4f7;color:#475467;font-size:12px}.total-row{font-weight:800;background:#f8fafc}
.table-wrap{overflow:auto}.badge{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:700;background:#eef4ff;color:#175cd3}.badge.warn{background:#fff7e6;color:var(--amber)}.badge.ok{background:#ecfdf3;color:#027a48}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:20}
.modal-box{background:#fff;border-radius:8px;max-width:940px;width:100%;max-height:90vh;overflow:auto;padding:16px}
@media(max-width:900px){.grid,.cards,.filters{grid-template-columns:1fr}.wide{grid-column:auto}header{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<header>
  <strong>本地发票资料库</strong>
  <span id="status" class="muted">正在连接本地服务...</span>
</header>

<main>
  <div id="localNotice" class="notice">普通本地资料库：不登录、不连接 Supabase。数据保存到本机 <b>facturas.db</b>，请使用 <b>http://localhost:8765/online.html</b>。</div>
  <div id="remoteNotice" class="notice warn hide">当前不是本地地址，无法写入本机数据库。请打开 http://localhost:8765/online.html。</div>

  <div class="tabs">
    <button class="tab active" data-view="dashboardView">概览</button>
    <button class="tab" data-view="libraryView">发票库</button>
    <button class="tab" data-view="manualView">新增</button>
    <button class="tab" data-view="aiView">AI识别</button>
    <button class="tab" data-view="paymentsView">付款</button>
    <button class="tab" data-view="reportView">IVA报表</button>
    <button class="tab" data-view="toolsView">工具</button>
  </div>

  <section id="dashboardView" class="view"></section>

  <section id="libraryView" class="view hide">
    <div class="panel">
      <div class="filters">
        <div><label>搜索</label><input id="filterText" placeholder="发票号/供应商/NIF/说明"></div>
        <div><label>类型</label><select id="filterType"><option value="">全部</option><option value="expense">支出</option><option value="income">收入</option><option value="abono">退款</option><option value="sale">销售</option></select></div>
        <div><label>年份</label><select id="filterYear"><option value="">全部</option></select></div>
        <div><label>月份</label><select id="filterMonth"><option value="">全部</option><option>01</option><option>02</option><option>03</option><option>04</option><option>05</option><option>06</option><option>07</option><option>08</option><option>09</option><option>10</option><option>11</option><option>12</option></select></div>
        <div><label>付款</label><select id="filterPaid"><option value="">全部</option><option value="paid">已付</option><option value="pending">未付</option></select></div>
        <div><label>排序</label><select id="sortBy"><option value="idDesc">编号新到旧</option><option value="dateDesc">日期新到旧</option><option value="supplier">供应商</option><option value="totalDesc">金额大到小</option></select></div>
      </div>
      <div class="actions">
        <button class="good" id="newExpenseBtn">新增支出</button>
        <button id="newIncomeBtn">新增收入</button>
        <button class="light" id="refreshBtn">刷新</button>
      </div>
    </div>
    <div id="invoiceList"></div>
  </section>

  <section id="manualView" class="view hide">
    <div class="panel">
      <h2>手工新增</h2>
      <p class="muted">保存后会立即写入本地 SQLite 数据库。</p>
      <div class="actions">
        <button class="good" onclick="openEditor(null,'expense')">新增支出发票</button>
        <button onclick="openEditor(null,'income')">新增收入发票</button>
        <button class="secondary" onclick="showView('libraryView')">返回发票库</button>
      </div>
    </div>
  </section>

  <section id="aiView" class="view hide">
    <div class="panel">
      <h2>AI识别后保存</h2>
      <p class="muted">选择图片或 PDF，AI 只生成草稿；你确认后才写入本地资料库。PDF 识别能力取决于当前免费模型。</p>
      <div class="grid">
        <div class="wide"><label>发票文件</label><input id="aiFile" type="file" accept="image/*,application/pdf"></div>
        <div><label>默认类型</label><select id="aiType"><option value="expense">支出</option><option value="income">收入</option><option value="abono">退款</option><option value="sale">销售</option></select></div>
      </div>
      <div class="actions">
        <button id="aiParseBtn" class="good">识别并生成草稿</button>
      </div>
      <div id="aiResult" class="item hide"></div>
    </div>
  </section>

  <section id="paymentsView" class="view hide"></section>
  <section id="reportView" class="view hide"></section>

  <section id="toolsView" class="view hide">
    <div class="panel">
      <h2>工具</h2>
      <div class="actions">
        <button id="exportJsonBtn">导出 JSON</button>
        <button id="exportCsvBtn">导出 CSV</button>
        <button class="secondary" onclick="location.href='index.html'">返回完整系统</button>
        <button class="light" id="reloadBtn">重新读取数据库</button>
      </div>
      <p class="muted" id="dbInfo"></p>
    </div>
  </section>
</main>

<div id="editor" class="modal hide">
  <div class="modal-box">
    <h2 id="editorTitle">发票</h2>
    <div class="grid">
      <div><label>类型</label><select id="f_type"><option value="expense">支出</option><option value="income">收入</option><option value="abono">退款</option><option value="sale">销售</option></select></div>
      <div><label>发票号</label><input id="f_num"></div>
      <div><label>日期</label><input id="f_date" type="date"></div>
      <div><label>到期日</label><input id="f_due" type="date"></div>
      <div class="wide"><label>供应商</label><input id="f_supplier"></div>
      <div class="wide"><label>客户</label><input id="f_client"></div>
      <div><label>NIF/CIF</label><input id="f_nif"></div>
      <div><label>Base</label><input id="f_base" type="number" step="0.01"></div>
      <div><label>IVA %</label><input id="f_iva_rate" type="number" step="0.01"></div>
      <div><label>IVA</label><input id="f_iva_amount" type="number" step="0.01"></div>
      <div><label>Total</label><input id="f_total" type="number" step="0.01"></div>
      <div><label>付款方式</label><input id="f_pay_method"></div>
      <div><label>付款日期</label><input id="f_pay_date" type="date"></div>
      <div><label>银行金额</label><input id="f_bank_amount" type="number" step="0.01"></div>
      <div><label>现金金额</label><input id="f_cash_amount" type="number" step="0.01"></div>
      <div class="wide"><label>文件/链接</label><input id="f_pdf_file"></div>
      <div class="wide"><label>说明</label><input id="f_description"></div>
      <div class="full"><label>备注</label><textarea id="f_notes"></textarea></div>
    </div>
    <div class="actions">
      <button class="good" id="saveEditorBtn">保存</button>
      <button class="secondary" id="closeEditorBtn">取消</button>
      <button class="danger hide" id="deleteEditorBtn">删除</button>
    </div>
  </div>
</div>

<script>
let state = { version: 'local', nextId: 1, invoices: [], savedAt: '' };
let currentView = 'dashboardView';
let editingId = null;

const $ = (id) => document.getElementById(id);
const money = (value) => `${Number(value || 0).toFixed(2)} EUR`;
const num = (value) => Number(value || 0);
const isPaid = (inv) => Boolean(inv.pay_date || inv.bank_amount || inv.cash_amount || /pagado|paid|tarjeta|banco|transfer/i.test(inv.pay_method || ''));
const typeLabel = (type) => ({ expense:'支出', income:'收入', abono:'退款', sale:'销售' }[type] || type || '支出');
const sign = (inv) => inv.type === 'income' || inv.type === 'sale' ? 1 : -1;

async function api(path, options = {}) {
  const res = await fetch(path, { ...options, headers: { 'Content-Type': 'application/json', ...(options.headers || {}) } });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function loadData() {
  $('status').textContent = '正在读取本地数据库...';
  state = await api('/api/data');
  state.invoices = Array.isArray(state.invoices) ? state.invoices : [];
  syncYearOptions();
  renderAll();
  $('status').textContent = `已连接，本地 ${state.invoices.length} 张，nextId=${state.nextId}`;
  $('dbInfo').textContent = `版本：${state.version || '-'}；保存时间：${state.savedAt || '-'}；数量：${state.invoices.length}`;
}

async function saveData(message = '已保存') {
  state.nextId = Math.max(num(state.nextId), ...state.invoices.map((inv) => num(inv.id) + 1), 1);
  const saved = await api('/api/save', { method: 'POST', body: JSON.stringify({ version: new Date().toISOString(), nextId: state.nextId, invoices: state.invoices }) });
  state = saved;
  syncYearOptions();
  renderAll();
  $('status').textContent = `${message}，共 ${state.invoices.length} 张`;
}

function showView(viewId) {
  currentView = viewId;
  document.querySelectorAll('.view').forEach((el) => el.classList.toggle('hide', el.id !== viewId));
  document.querySelectorAll('.tab').forEach((el) => el.classList.toggle('active', el.dataset.view === viewId));
  renderAll();
}

function makeBlank(type = 'expense') {
  return {
    id: state.nextId,
    type,
    num: '',
    date: new Date().toISOString().slice(0, 10),
    due: '',
    supplier: '',
    client: '',
    nif: '',
    description: '',
    base: 0,
    iva_rate: 21,
    iva_amount: 0,
    total: 0,
    pay_method: '',
    pay_date: '',
    bank_amount: 0,
    cash_amount: 0,
    pdfFile: '',
    notes: ''
  };
}

function openEditor(id, type = 'expense', draft = null) {
  editingId = id ? Number(id) : null;
  const inv = draft || state.invoices.find((item) => Number(item.id) === editingId) || makeBlank(type);
  $('editorTitle').textContent = editingId ? `编辑 #${editingId}` : '新增发票';
  const fields = ['type','num','date','due','supplier','client','nif','description','base','iva_rate','iva_amount','total','pay_method','pay_date','bank_amount','cash_amount','notes'];
  fields.forEach((key) => { const el = $(`f_${key}`); if (el) el.value = inv[key] ?? ''; });
  $('f_pdf_file').value = inv.pdfFile || inv.pdf_file || '';
  $('deleteEditorBtn').classList.toggle('hide', !editingId);
  $('editor').classList.remove('hide');
}

function closeEditor() {
  $('editor').classList.add('hide');
  editingId = null;
}

function readEditor() {
  const inv = editingId ? { ...state.invoices.find((item) => Number(item.id) === editingId) } : makeBlank($('f_type').value);
  ['type','num','date','due','supplier','client','nif','description','pay_method','pay_date','notes'].forEach((key) => inv[key] = $(`f_${key}`).value.trim());
  ['base','iva_rate','iva_amount','total','bank_amount','cash_amount'].forEach((key) => inv[key] = num($(`f_${key}`).value));
  inv.pdfFile = $('f_pdf_file').value.trim();
  if (!inv.id) inv.id = state.nextId;
  if (!inv.iva_amount && inv.base && inv.iva_rate) inv.iva_amount = +(inv.base * inv.iva_rate / 100).toFixed(2);
  if (!inv.total && inv.base) inv.total = +(inv.base + inv.iva_amount).toFixed(2);
  return inv;
}

async function saveEditor() {
  const inv = readEditor();
  if (!inv.num) return alert('请填写发票号');
  if (!editingId) {
    state.invoices.push(inv);
    state.nextId = Math.max(num(state.nextId), num(inv.id) + 1);
  } else {
    state.invoices = state.invoices.map((item) => Number(item.id) === editingId ? inv : item);
  }
  closeEditor();
  await saveData('发票已保存');
  showView('libraryView');
}

async function deleteInvoice(id) {
  if (!confirm(`确定删除 #${id}？本地数据库会先自动备份。`)) return;
  state.invoices = state.invoices.filter((inv) => Number(inv.id) !== Number(id));
  closeEditor();
  await saveData('已删除');
}

function filteredInvoices() {
  const text = ($('filterText')?.value || '').trim().toLowerCase();
  const type = $('filterType')?.value || '';
  const year = $('filterYear')?.value || '';
  const month = $('filterMonth')?.value || '';
  const paid = $('filterPaid')?.value || '';
  const sortBy = $('sortBy')?.value || 'idDesc';
  let rows = state.invoices.filter((inv) => {
    const hay = [inv.id, inv.num, inv.supplier, inv.client, inv.nif, inv.description, inv.notes].join(' ').toLowerCase();
    if (text && !hay.includes(text)) return false;
    if (type && inv.type !== type) return false;
    if (year && String(inv.date || '').slice(0, 4) !== year) return false;
    if (month && String(inv.date || '').slice(5, 7) !== month) return false;
    if (paid === 'paid' && !isPaid(inv)) return false;
    if (paid === 'pending' && isPaid(inv)) return false;
    return true;
  });
  rows.sort((a, b) => {
    if (sortBy === 'dateDesc') return String(b.date || '').localeCompare(String(a.date || ''));
    if (sortBy === 'supplier') return String(a.supplier || a.client || '').localeCompare(String(b.supplier || b.client || ''));
    if (sortBy === 'totalDesc') return num(b.total) - num(a.total);
    return num(b.id) - num(a.id);
  });
  return rows;
}

function renderDashboard() {
  const total = state.invoices.length;
  const expense = state.invoices.filter((inv) => sign(inv) < 0).reduce((s, inv) => s + num(inv.total), 0);
  const income = state.invoices.filter((inv) => sign(inv) > 0).reduce((s, inv) => s + num(inv.total), 0);
  const iva = state.invoices.reduce((s, inv) => s + sign(inv) * num(inv.iva_amount), 0);
  const pending = state.invoices.filter((inv) => !isPaid(inv)).length;
  $('dashboardView').innerHTML = `
    <div class="cards">
      <div class="card"><div class="label">发票数量</div><div class="value">${total}</div></div>
      <div class="card"><div class="label">收入</div><div class="value">${money(income)}</div></div>
      <div class="card"><div class="label">支出</div><div class="value">${money(expense)}</div></div>
      <div class="card"><div class="label">未付</div><div class="value">${pending}</div></div>
    </div>
    <div class="panel">
      <h2>本地保存状态</h2>
      <p>IVA净额：<b>${money(iva)}</b></p>
      <p class="muted">数据来自本机 SQLite：facturas.db。这个页面已经移除云端登录、Supabase 和远程上传。</p>
      <div class="actions">
        <button class="good" onclick="openEditor(null,'expense')">新增支出</button>
        <button onclick="openEditor(null,'income')">新增收入</button>
        <button class="secondary" onclick="showView('libraryView')">查看发票库</button>
      </div>
    </div>`;
}

function renderLibrary() {
  const rows = filteredInvoices();
  $('invoiceList').innerHTML = rows.map((inv) => `
    <div class="item">
      <div class="item-head">
        <div>
          <div class="name">#${inv.id} ${escapeHtml(inv.supplier || inv.client || '未命名')} <span class="badge">${typeLabel(inv.type)}</span> ${isPaid(inv) ? '<span class="badge ok">已付</span>' : '<span class="badge warn">未付</span>'}</div>
          <div class="muted">${escapeHtml(inv.num || '')} · ${escapeHtml(inv.date || '')} · ${escapeHtml(inv.nif || '')}</div>
        </div>
        <div><b>${money(inv.total)}</b></div>
      </div>
      <div>${escapeHtml(inv.description || '')}</div>
      <div class="actions">
        <button onclick="openEditor(${inv.id})">编辑</button>
        ${inv.pdfFile ? `<button class="light" onclick="openFile('${escapeAttr(inv.pdfFile)}')">打开文件</button>` : ''}
        <button class="danger" onclick="deleteInvoice(${inv.id})">删除</button>
      </div>
    </div>`).join('') || '<div class="panel">没有符合条件的发票。</div>';
}

function renderPayments() {
  const rows = state.invoices.slice().sort((a, b) => String(b.date || '').localeCompare(String(a.date || ''))).map((inv) => `
    <tr><td>#${inv.id}</td><td>${escapeHtml(inv.date || '')}</td><td>${escapeHtml(inv.supplier || inv.client || '')}</td><td>${escapeHtml(inv.num || '')}</td><td>${money(inv.total)}</td><td>${isPaid(inv) ? '已付' : '未付'}</td><td>${escapeHtml(inv.pay_method || '')}</td><td>${escapeHtml(inv.pay_date || '')}</td></tr>`).join('');
  $('paymentsView').innerHTML = `<div class="panel"><h2>付款状态</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>日期</th><th>名称</th><th>发票号</th><th>Total</th><th>状态</th><th>方式</th><th>日期</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function renderReport() {
  const byMonth = new Map();
  state.invoices.forEach((inv) => {
    const key = String(inv.date || '无日期').slice(0, 7);
    const row = byMonth.get(key) || { base:0, iva:0, total:0, count:0 };
    row.base += sign(inv) * num(inv.base);
    row.iva += sign(inv) * num(inv.iva_amount);
    row.total += sign(inv) * num(inv.total);
    row.count += 1;
    byMonth.set(key, row);
  });
  const rows = [...byMonth.entries()].sort((a,b)=>b[0].localeCompare(a[0])).map(([month,row]) => `<tr><td>${month}</td><td>${row.count}</td><td>${money(row.base)}</td><td>${money(row.iva)}</td><td>${money(row.total)}</td></tr>`).join('');
  $('reportView').innerHTML = `<div class="panel"><h2>IVA报表</h2><div class="table-wrap"><table><thead><tr><th>月份</th><th>数量</th><th>Base</th><th>IVA</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function renderAll() {
  renderDashboard();
  if (currentView === 'libraryView') renderLibrary();
  if (currentView === 'paymentsView') renderPayments();
  if (currentView === 'reportView') renderReport();
  if ($('dbInfo')) $('dbInfo').textContent = `版本：${state.version || '-'}；保存时间：${state.savedAt || '-'}；数量：${state.invoices.length}`;
}

function syncYearOptions() {
  const select = $('filterYear');
  if (!select) return;
  const current = select.value;
  const years = [...new Set(state.invoices.map((inv) => String(inv.date || '').slice(0, 4)).filter((year) => /^\d{4}$/.test(year)))].sort().reverse();
  select.innerHTML = '<option value="">全部</option>' + years.map((year) => `<option>${year}</option>`).join('');
  select.value = years.includes(current) ? current : '';
}

async function parseAiFile() {
  const file = $('aiFile').files[0];
  if (!file) return alert('请选择文件');
  $('aiParseBtn').disabled = true;
  $('aiParseBtn').textContent = '识别中...';
  try {
    const base64 = await fileToBase64(file);
    const result = await api('/api/ai-parse', { method: 'POST', body: JSON.stringify({ fileName: file.name, mimeType: file.type || 'application/octet-stream', base64 }) });
    const draft = { ...makeBlank($('aiType').value), ...result.parsed, id: state.nextId, pdfFile: file.name, notes: `AI识别草稿，文件：${file.name}` };
    $('aiResult').classList.remove('hide');
    $('aiResult').innerHTML = `<div class="item-head"><div><b>${escapeHtml(draft.supplier || draft.client || draft.num || file.name)}</b><div class="muted">${escapeHtml(draft.date || '')} · ${money(draft.total)} · 置信度 ${Math.round(num(draft.confidence) * 100)}%</div></div></div><pre class="raw">${escapeHtml(JSON.stringify(draft, null, 2))}</pre><div class="actions"><button class="good" id="useAiDraftBtn">打开草稿确认</button></div>`;
    $('useAiDraftBtn').onclick = () => openEditor(null, draft.type, draft);
  } catch (err) {
    alert(`AI识别失败：${err.message}`);
  } finally {
    $('aiParseBtn').disabled = false;
    $('aiParseBtn').textContent = '识别并生成草稿';
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function exportJson() {
  download(`facturas_${new Date().toISOString().slice(0,10)}.json`, JSON.stringify(state, null, 2), 'application/json');
}

function exportCsv() {
  const headers = ['id','type','num','date','supplier','client','nif','base','iva_rate','iva_amount','total','pay_method','pay_date','description'];
  const rows = [headers.join(',')].concat(state.invoices.map((inv) => headers.map((key) => csv(inv[key])).join(',')));
  download(`facturas_${new Date().toISOString().slice(0,10)}.csv`, rows.join('\n'), 'text/csv');
}

function download(name, text, type) {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function csv(value) {
  const text = String(value ?? '');
  return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
}

function openFile(file) {
  if (/^https?:\/\//i.test(file)) window.open(file, '_blank');
  else window.open(file.replace(/\\/g, '/'), '_blank');
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;');
}

document.querySelectorAll('.tab').forEach((btn) => btn.addEventListener('click', () => showView(btn.dataset.view)));
['filterText','filterType','filterYear','filterMonth','filterPaid','sortBy'].forEach((id) => $(id).addEventListener('input', renderLibrary));
$('newExpenseBtn').onclick = () => openEditor(null, 'expense');
$('newIncomeBtn').onclick = () => openEditor(null, 'income');
$('refreshBtn').onclick = loadData;
$('reloadBtn').onclick = loadData;
$('saveEditorBtn').onclick = saveEditor;
$('closeEditorBtn').onclick = closeEditor;
$('deleteEditorBtn').onclick = () => deleteInvoice(editingId);
$('exportJsonBtn').onclick = exportJson;
$('exportCsvBtn').onclick = exportCsv;
$('aiParseBtn').onclick = parseAiFile;
['f_base','f_iva_rate'].forEach((id) => $(id).addEventListener('input', () => {
  const base = num($('f_base').value);
  const rate = num($('f_iva_rate').value);
  $('f_iva_amount').value = base && rate ? (base * rate / 100).toFixed(2) : $('f_iva_amount').value;
  $('f_total').value = base ? (base + num($('f_iva_amount').value)).toFixed(2) : $('f_total').value;
}));

if (!['localhost','127.0.0.1'].includes(location.hostname)) $('remoteNotice').classList.remove('hide');
loadData().catch((err) => {
  $('status').textContent = '本地服务未连接';
  $('localNotice').className = 'notice warn';
  $('localNotice').innerHTML = `无法连接本地数据库：${escapeHtml(err.message)}。请先运行本地服务，再打开 http://localhost:8765/online.html。`;
});
</script>
