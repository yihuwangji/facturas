ng-bottom:10px;border-bottom:2px solid #f0f0f0}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}.form-group{display:flex;flex-direction:column;gap:5px}.form-group label{font-size:13px;font-weight:600;color:#555}.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;transition:border-color .2s;background:white}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#c60b1e;box-shadow:0 0 0 3px rgba(198,11,30,.1)}.form-actions{margin-top:18px;display:flex;gap:10px}.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}.btn-primary{background:#c60b1e;color:white}.btn-primary:hover{background:#a00818}.btn-success{background:#22c55e;color:white}.btn-warning{background:#f97316;color:white}.btn-secondary{background:#6b7280;color:white}.btn-danger{background:#ef4444;color:white}.btn-info{background:#3b82f6;color:white}.btn-sm{padding:5px 10px;font-size:12px}.table-card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;margin-bottom:25px}.table-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0;flex-wrap:wrap;gap:10px}.table-header h3{font-size:16px;font-weight:700}.table-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.search-input{padding:7px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;width:180px}.search-input:focus{outline:none;border-color:#c60b1e}.filter-select{padding:7px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px}table{width:100%;border-collapse:collapse}thead th{background:#f8f9fa;padding:12px 14px;text-align:left;font-size:12px;font-weight:700;color:#666;text-transform:uppercase;border-bottom:2px solid #e0e0e0}tbody tr{border-bottom:1px solid #f0f0f0;transition:background .15s}tbody tr:hover{background:#fafafa}tbody td{padding:11px 14px;font-size:13px}.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}.badge-paid{background:#dcfce7;color:#16a34a}.badge-unpaid{background:#fee2e2;color:#dc2626}.badge-partial{background:#fef3c7;color:#d97706}.badge-bank{background:#dbeafe;color:#1d4ed8}.badge-cash{background:#f0fdf4;color:#15803d;border:1px solid #86efac}.badge-both{background:#ede9fe;color:#7c3aed}.badge-pending{background:#f3f4f6;color:#6b7280}.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}.modal-overlay.active{display:flex}.modal{background:white;border-radius:16px;padding:30px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}.modal h3{font-size:18px;font-weight:700;margin-bottom:20px;color:#333}.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}.notification{position:fixed;top:20px;right:20px;padding:12px 20px;background:#22c55e;color:white;border-radius:10px;font-weight:600;box-shadow:0 4px 15px rgba(0,0,0,.2);z-index:9999;transform:translateX(120%);transition:transform .3s}.notification.show{transform:translateX(0)}.notification.error{background:#ef4444}.notification.warning{background:#f97316}.quarter-filter{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}.quarter-btn{padding:7px 16px;border:1.5px solid #ddd;border-radius:20px;background:white;cursor:pointer;font-size:13px;font-weight:600;color:#666;transition:all .2s}.quarter-btn:hover,.quarter-btn.active{background:#c60b1e;color:white;border-color:#c60b1e}.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:25px}.report-card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}.report-card h4{font-size:15px;font-weight:700;color:#444;margin-bottom:15px;padding-bottom:8px;border-bottom:2px solid #f0f0f0}.report-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5;font-size:14px}.report-row:last-child{border-bottom:none}.report-row.total{font-weight:700;font-size:15px;color:#c60b1e;margin-top:5px;padding-top:12px;border-top:2px solid #f0f0f0;border-bottom:none}.empty-state{text-align:center;padding:50px;color:#bbb}.empty-state .icon{font-size:48px;margin-bottom:10px}.amount-pos{color:#16a34a;font-weight:700}.amount-neg{color:#dc2626;font-weight:700}tfoot td{font-weight:700;background:#f8f9fa;padding:12px 14px;font-size:13px;border-top:2px solid #e0e0e0}@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.report-grid{grid-template-columns:1fr}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.import-hint-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center}

</style></head><body><div class="header"><div><h1>🇪🇸 西班牙IVA税务发票管理系统</h1><div class="subtitle">Gestión de Facturas · 收付款管理 · 税务申报</div></div><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><select id="yearFilter" onchange="refreshAll()" style="padding:8px 12px;border-radius:8px;border:1.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);color:white;font-weight:600;font-size:14px;"></select><span id="saveStatusBadge" class="header-saved">✅ 已保存</span><button class="btn btn-secondary btn-sm" onclick="exportData()">💾 导出备份</button><label class="btn btn-info btn-sm" style="cursor:pointer">📂 导入数据<input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display:none"></label></div></div>
<div class="save-bar" id="saveBar"><span>⚠️ 有未导出的更改，建议导出备份到文件，防止数据丢失</span><div class="save-bar-btns"><button class="btn-savebar save" onclick="exportDataAndDismiss()">💾 立即导出备份</button><button class="btn-savebar dismiss" onclick="dismissSaveBar()">稍后再说</button></div></div>
<div class="import-hint-modal" id="importHintModal"><div class="import-hint-box"><div style="font-size:48px;margin-bottom:12px">📂</div><h3>加载上次的数据？</h3><p>检测到本地缓存中有 <strong id="hintCount">0</strong> 条发票记录。<br>如果你有导出的 <code>.json</code> 备份文件，建议先导入以确保数据最新。</p><div class="hint-btns"><label class="btn btn-primary" style="cursor:pointer">📂 导入备份文件<input type="file" accept=".json" onchange="importDataFromHint(event)" style="display:none"></label><button class="btn btn-success" onclick="closeImportHint()">✅ 使用当前数据</button></div></div></div><div class="tabs"><button class="tab-btn active" onclick="switchTab('dashboard')">📊 仪表板</button><button class="tab-btn" onclick="switchTab('income')">📥 收入发票</button><button class="tab-btn" onclick="switchTab('expense')">📤 支出发票</button><button class="tab-btn" onclick="switchTab('payments')">💳 收付款</button><button class="tab-btn" onclick="switchTab('report')">📋 季度申报</button></div>
<div id="tab-dashboard" class="tab-content active">
  <div id="statsGrid" class="stats-grid"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
    <div class="table-card"><div class="table-header"><h3>⚠️ 未收款发票</h3><span id="unpaidCount" style="background:#fee2e2;color:#dc2626;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700"></span></div><div id="unpaidList"></div></div>
    <div class="table-card"><div class="table-header"><h3>⚠️ 未付款支出</h3><span id="unpaidExpCount" style="background:#fee2e2;color:#dc2626;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700"></span></div><div id="unpaidExpList"></div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card blue"><label>🏦 银行收款</label><div class="value" id="dashBankIn">€0.00</div></div>
    <div class="stat-card green"><label>💵 现金收款</label><div class="value" id="dashCashIn">€0.00</div></div>
    <div class="stat-card red"><label>🏦 银行付款</label><div class="value" id="dashBankOut">€0.00</div></div>
    <div class="stat-card orange"><label>💵 现金付款</label><div class="value" id="dashCashOut">€0.00</div></div>
  </div>
</div>
<div id="tab-income" class="tab-content">
  <div class="form-card"><h3>➕ 新增收入发票</h3>
    <div class="form-grid">
      <div class="form-group"><label>发票号码 *</label><input type="text" id="in_num" placeholder="FAC-2024-001"></div>
      <div class="form-group"><label>发票日期 *</label><input type="date" id="in_date"></div>
      <div class="form-group"><label>到期日期</label><input type="date" id="in_due"></div>
      <div class="form-group"><label>客户名称 *</label><input type="text" id="in_client" placeholder="客户名称"></div>
      <div class="form-group"><label>客户 NIF/CIF</label><input type="text" id="in_nif" placeholder="B12345678"></div>
      <div class="form-group"><label>概念描述</label><input type="text" id="in_desc" placeholder="服务或商品描述"></div>
      <div class="form-group"><label>税前金额(€) *</label><input type="number" id="in_base" placeholder="0.00" step="0.01" oninput="calcIncome()"></div>
      <div class="form-group"><label>IVA税率 *</label><select id="in_iva" onchange="calcIncome()"><option value="21">21% 一般</option><option value="10">10% 减税</option><option value="4">4% 超减税</option><option value="0">0% 免税</option></select></div>
      <div class="form-group"><label>IRPF预扣</label><select id="in_irpf" onchange="calcIncome()"><option value="0">0%</option><option value="7">7%</option><option value="15">15%</option><option value="19">19%</option></select></div>
      <div class="form-group"><label>IVA金额(€)</label><input type="text" id="in_iva_amount" readonly style="background:#f8f9fa"></div>
      <div class="form-group"><label>IRPF金额(€)</label><input type="text" id="in_irpf_amount" readonly style="background:#f8f9fa"></div>
      <div class="form-group"><label>发票总计(€)</label><input type="text" id="in_total" readonly style="background:#f8f9fa;font-weight:700"></div>
      <div class="form-group"><label>支付方式</label><select id="in_pay_method" onchange="togglePayFields('in')"><option value="pending">⏳ 待收款</option><option value="bank">🏦 银行转账</option><option value="cash">💵 现金</option><option value="both">🔀 银行+现金</option></select></div>
      <div class="form-group" id="in_bank_grp" style="display:none"><label>银行收款(€)</label><input type="number" id="in_bank_amt" placeholder="0.00" step="0.01"></div>
      <div class="form-group" id="in_cash_grp" style="display:none"><label>现金收款(€)</label><input type="number" id="in_cash_amt" placeholder="0.00" step="0.01"></div>
      <div class="form-group"><label>收款日期</label><input type="date" id="in_pay_date"></div>
      <div class="form-group"><label>备注</label><input type="text" id="in_notes" placeholder="可选备注"></div>
    </div>
    <div class="form-actions"><button class="btn btn-primary" onclick="addInvoice('income')">✅ 保存发票</button><button class="btn btn-secondary" onclick="clearForm('income')">🔄 清空</button></div>
  </div>
  <div class="table-card">
    <div class="table-header"><h3>📋 收入发票列表</h3>
      <div class="table-controls">
        <input type="text" class="search-input" id="incomeSearch" placeholder="🔍 搜索..." oninput="renderIncome()">
        <select class="filter-select" id="incomeStatusFilter" onchange="renderIncome()"><option value="all">全部状态</option><option value="paid">已收款</option><option value="unpaid">未收款</option><option value="partial">部分收款</option></select>
        <select class="filter-select" id="incomePayFilter" onchange="renderIncome()"><option value="all">全部方式</option><option value="bank">银行</option><option value="cash">现金</option><option value="both">混合</option><option value="pending">待收</option></select>
      </div>
    </div>
    <div id="incomeTable"></div>
  </div>
</div>
<div id="tab-expense" class="tab-content">
  <div class="form-card"><h3>➕ 新增支出发票</h3>
    <div class="form-grid">
      <div class="form-group"><label>发票号码 *</label><input type="text" id="ex_num" placeholder="供应商发票号"></div>
      <div class="form-group"><label>发票日期 *</label><input type="date" id="ex_date"></div>
      <div class="form-group"><label>到期日期</label><input type="date" id="ex_due"></div>
      <div class="form-group"><label>供应商名称 *</label><input type="text" id="ex_supplier" placeholder="供应商名称"></div>
      <div class="form-group"><label>供应商 NIF/CIF</label><input type="text" id="ex_nif" placeholder="B12345678"></div>
      <div class="form-group"><label>概念描述</label><input type="text" id="ex_desc" placeholder="采购描述"></div>
      <div class="form-group"><label>税前金额(€) *</label><input type="number" id="ex_base" placeholder="0.00" step="0.01" oninput="calcExpense()"></div>
      <div class="form-group"><label>IVA税率 *</label><select id="ex_iva" onchange="calcExpense()"><option value="21">21% 一般</option><option value="10">10% 减税</option><option value="4">4% 超减税</option><option value="0">0% 免税</option></select></div>
      <div class="form-group"><label>IVA金额(€)</label><input type="text" id="ex_iva_amount" readonly style="background:#f8f9fa"></div>
      <div class="form-group"><label>发票总计(€)</label><input type="text" id="ex_total" readonly style="background:#f8f9fa;font-weight:700"></div>
      <div class="form-group"><label>支付方式</label><select id="ex_pay_method" onchange="togglePayFields('ex')"><option value="pending">⏳ 待付款</option><option value="bank">🏦 银行转账</option><option value="cash">💵 现金</option><option value="both">🔀 银行+现金</option></select></div>
      <div class="form-group" id="ex_bank_grp" style="display:none"><label>银行付款(€)</label><input type="number" id="ex_bank_amt" placeholder="0.00" step="0.01"></div>
      <div class="form-group" id="ex_cash_grp" style="display:none"><label>现金付款(€)</label><input type="number" id="ex_cash_amt" placeholder="0.00" step="0.01"></div>
      <div class="form-group"><label>付款日期</label><input type="date" id="ex_pay_date"></div>
      <div class="form-group"><label>支出类别</label><select id="ex_category"><option value="material">原材料/商品</option><option value="service">专业服务</option><option value="rent">租金</option><option value="utility">水电煤气</option><option value="transport">交通运输</option><option value="marketing">营销广告</option><option value="equipment">设备</option><option value="other">其他</option></select></div>
      <div class="form-group"><label>备注</label><input type="text" id="ex_notes" placeholder="可选备注"></div>
    </div>
    <div class="form-actions"><button class="btn btn-primary" onclick="addInvoice('expense')">✅ 保存发票</button><button class="btn btn-secondary" onclick="clearForm('expense')">🔄 清空</button></div>
  </div>
  <div class="table-card">
    <div class="table-header"><h3>📋 支出发票列表</h3>
      <div class="table-controls">
        <input type="text" class="search-input" id="expenseSearch" placeholder="🔍 搜索..." oninput="renderExpense()">
        <select class="filter-select" id="expenseStatusFilter" onchange="renderExpense()"><option value="all">全部状态</option><option value="paid">已付款</option><option value="unpaid">未付款</option></select>
      </div>
    </div>
    <div id="expenseTable"></div>
  </div>
</div>
<div id="tab-payments" class="tab-content">
  <div class="stats-grid">
    <div class="stat-card blue"><label>🏦 银行净余额</label><div class="value" id="bankBalance">€0.00</div><div class="sub">收款-付款</div></div>
    <div class="stat-card green"><label>💵 现金净余额</label><div class="value" id="cashBalance">€0.00</div><div class="sub">收款-付款</div></div>
    <div class="stat-card orange"><label>📥 总收款</label><div class="value" id="totalCollected">€0.00</div></div>
    <div class="stat-card red"><label>📤 总付款</label><div class="value" id="totalPaid">€0.00</div></div>
  </div>
  <div class="table-card">
    <div class="table-header"><h3>💳 收付款明细</h3>
      <div class="table-controls">
        <select class="filter-select" id="payTypeFilter" onchange="renderPayments()"><option value="all">收+付</option><option value="income">收款</option><option value="expense">付款</option></select>
        <select class="filter-select" id="payMethodFilter" onchange="renderPayments()"><option value="all">全部方式</option><option value="bank">银行</option><option value="cash">现金</option></select>
      </div>
    </div>
    <div id="paymentsTable"></div>
  </div>
</div>
<div id="tab-report" class="tab-content">
  <div class="quarter-filter">
    <button class="quarter-btn active" id="q1btn" onclick="setQuarter(1)">T1 Ene-Mar</button>
    <button class="quarter-btn" id="q2btn" onclick="setQuarter(2)">T2 Abr-Jun</button>
    <button class="quarter-btn" id="q3btn" onclick="setQuarter(3)">T3 Jul-Sep</button>
    <button class="quarter-btn" id="q4btn" onclick="setQuarter(4)">T4 Oct-Dic</button>
    <button class="quarter-btn" id="q0btn" onclick="setQuarter(0)">全年汇总</button>
  </div>
  <div id="reportContent"></div>
</div>

function fmt(n){return'€'+(parseFloat(n)||0).toFixed(2);}
function fmtDate(d){if(!d)return'-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function getYear(){return parseInt(document.getElementById('yearFilter').value);}
function notify(msg,type){var e=document.getElementById('notification');e.textContent=msg;e.className='notification show'+(type&&type!=='success'?' '+type:'');setTimeout(()=>e.classList.remove('show'),3000);}

function initYear(){var s=document.getElementById('yearFilter'),c=new Date().getFullYear();s.innerHTML='';for(var y=c+1;y>=c-3;y--){var o=document.createElement('option');o.value=y;o.textContent=y+'年';if(y===c)o.selected=true;s.appendChild(o);}}

function switchTab(n){document.querySelectorAll('.tab-btn').forEach((b,i)=>{var t=['dashboard','income','expense','payments','report'];b.classList.toggle('active',t[i]===n);});document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+n).classList.add('active');if(n==='dashboard')renderDashboard();if(n==='income')renderIncome();if(n==='expense')renderExpense();if(n==='payments')renderPayments();if(n==='report')renderReport();}

function togglePayFields(pfx){var m=document.getElementById(pfx+'_pay_method').value;var bg=document.getElementById(pfx+'_bank_grp');var cg=document.getElementById(pfx+'_cash_grp');bg.style.display=(m==='bank'||m==='both')?'flex':'none';cg.style.display=(m==='cash'||m==='both')?'flex':'none';}

function calcIncome(){var b=parseFloat(document.getElementById('in_base').value)||0;var ir=parseFloat(document.getElementById('in_iva').value)||0;var ip=parseFloat(document.getElementById('in_irpf').value)||0;var iva=b*ir/100;var irpf=b*ip/100;var tot=b+iva-irpf;document.getElementById('in_iva_amount').value=iva.toFixed(2);document.getElementById('in_irpf_amount').value=irpf.toFixed(2);document.getElementById('in_total').value=tot.toFixed(2);}
function calcExpense(){var b=parseFloat(document.getElementById('ex_base').value)||0;var ir=parseFloat(document.getElementById('ex_iva').value)||0;var iva=b*ir/100;document.getElementById('ex_iva_amount').value=iva.toFixed(2);document.getElementById('ex_total').value=(b+iva).toFixed(2);}

function getPayStatus(inv){if(inv.payMethod==='pending')return'unpaid';if(inv.payMethod==='bank'||inv.payMethod==='cash'||inv.payMethod==='both')return'paid';return'unpaid';}
function payBadge(m){if(m==='bank')return'<span class="badge badge-bank">🏦 银行</span>';if(m==='cash')return'<span class="badge badge-cash">💵 现金</span>';if(m==='both')return'<span class="badge badge-both">🔀 混合</span>';return'<span class="badge badge-pending">⏳ 待收付</span>';}
function statusBadge(inv){var s=getPayStatus(inv);if(s==='paid')return'<span class="badge badge-paid">✅ 已'+(inv.type==='income'?'收':'付')+'款</span>';return'<span class="badge badge-unpaid">❌ 未'+(inv.type==='income'?'收':'付')+'款</span>';}

function addInvoice(type){
  var num=document.getElementById(type==='income'?'in_num':'ex_num').value.trim();
  var date=document.getElementById(type==='income'?'in_date':'ex_date').value;
  var base=parseFloat(document.getElementById(type==='income'?'in_base':'ex_base').value)||0;
  if(!num||!date||!base){notify('请填写发票号、日期和金额','error');return;}
  var ivaRate=parseFloat(document.getElementById(type==='income'?'in_iva':'ex_iva').value)||0;
  var irpfRate=type==='income'?(parseFloat(document.getElementById('in_irpf').value)||0):0;
  var ivaAmt=base*ivaRate/100;
  var irpfAmt=base*irpfRate/100;
  var total=base+ivaAmt-irpfAmt;
  var pm=document.getElementById(type==='income'?'in_pay_method':'ex_pay_method').value;
  var bankAmt=0,cashAmt=0;
  if(pm==='bank'||pm==='both')bankAmt=parseFloat(document.getElementById(type==='income'?'in_bank_amt':'ex_bank_amt').value)||0;
  if(pm==='cash'||pm==='both')cashAmt=parseFloat(document.getElementById(type==='income'?'in_cash_amt':'ex_cash_amt').value)||0;
  var inv={id:DB.nextId++,type:type,num:num,date:date,due:document.getElementById(type==='income'?'in_due':'ex_due').value,
    client:type==='income'?document.getElementById('in_client').value:'',
    supplier:type==='expense'?document.getElementById('ex_supplier').value:'',
    nif:document.getElementById(type==='income'?'in_nif':'ex_nif').value,
    desc:document.getElementById(type==='income'?'in_desc':'ex_desc').value,
    base:base,ivaRate:ivaRate,ivaAmt:ivaAmt,irpfRate:irpfRate,irpfAmt:irpfAmt,total:total,
    payMethod:pm,bankAmt:bankAmt,cashAmt:cashAmt,
    payDate:document.getElementById(type==='income'?'in_pay_date':'ex_pay_date').value,
    notes:document.getElementById(type==='income'?'in_notes':'ex_notes').value,
    category:type==='expense'?document.getElementById('ex_category').value:'',
    createdAt:new Date().toISOString()};
  DB.invoices.push(inv);save();
  notify('发票 '+num+' 已保存！');
  clearForm(type);
  if(type==='income')renderIncome();else renderExpense();
}

function renderPayments(){
  var all=filterByYear(DB.invoices.filter(i=>i.payMethod!=='pending'));
  var tf=document.getElementById('payTypeFilter').value;
  var mf=document.getElementById('payMethodFilter').value;
  if(tf!=='all')all=all.filter(i=>i.type===tf);
  if(mf==='bank')all=all.filter(i=>i.payMethod==='bank'||i.payMethod==='both');
  if(mf==='cash')all=all.filter(i=>i.payMethod==='cash'||i.payMethod==='both');
  // 计算余额
  var bin=0,cin=0,bout=0,cout=0;
  var yi=filterByYear(DB.invoices.filter(i=>i.type==='income'&&i.payMethod!=='pending'));
  var ye=filterByYear(DB.invoices.filter(i=>i.type==='expense'&&i.payMethod!=='pending'));
  yi.forEach(i=>{if(i.payMethod==='bank')bin+=i.total;else if(i.payMethod==='cash')cin+=i.total;else if(i.payMethod==='both'){bin+=i.bankAmt||0;cin+=i.cashAmt||0;}});
  ye.forEach(i=>{if(i.payMethod==='bank')bout+=i.total;else if(i.payMethod==='cash')cout+=i.total;else if(i.payMethod==='both'){bout+=i.bankAmt||0;cout+=i.cashAmt||0;}});
  document.getElementById('bankBalance').textContent=fmt(bin-bout);
  document.getElementById('cashBalance').textContent=fmt(cin-cout);
  document.getElementById('totalCollected').textContent=fmt(bin+cin);
  document.getElementById('totalPaid').textContent=fmt(bout+cout);
  var el=document.getElementById('paymentsTable');
  if(!all.length){el.innerHTML='<div class="empty-state"><div class="icon">💳</div><p>暂无收付款记录</p></div>';return;}
  var rows=all.map(i=>{
    var amtStr='',bk=0,ck=0;
    if(i.payMethod==='bank'){bk=i.type==='income'?i.total:i.total;}
    else if(i.payMethod==='cash'){ck=i.type==='income'?i.total:i.total;}
    else if(i.payMethod==='both'){bk=i.bankAmt||0;ck=i.cashAmt||0;}
    return'<tr><td>'+fmtDate(i.payDate||i.date)+'</td><td><span class="badge '+(i.type==='income'?'badge-paid':'badge-unpaid')+'">'+(i.type==='income'?'📥 收款':'📤 付款')+'</span></td><td><strong>'+i.num+'</strong></td><td>'+(i.client||i.supplier)+'</td><td>'+payBadge(i.payMethod)+'</td><td>'+(bk?'<span class="amount-pos">'+fmt(bk)+'</span>':'-')+'</td><td>'+(ck?'<span class="amount-pos">'+fmt(ck)+'</span>':'-')+'</td><td><strong>'+fmt(i.total)+'</strong></td><td>'+(i.notes||'-')+'</td></tr>';}).join('');
  el.innerHTML='<table><thead><tr><th>收付日期</th><th>类型</th><th>发票号</th><th>客户/供应商</th><th>方式</th><th>银行金额</th><th>现金金额</th><th>总计</th><th>备注</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function setQuarter(q){_curQ=q;[0,1,2,3,4].forEach(i=>document.getElementById('q'+i+'btn').classList.toggle('active',i===q));renderReport();}
function renderReport(){
  var y=getYear();
  var inc=DB.invoices.filter(i=>i.type==='income'&&i.date&&i.date.startsWith(y));
  var exp=DB.invoices.filter(i=>i.type==='expense'&&i.date&&i.date.startsWith(y));
  function qFilter(arr,q){if(q===0)return arr;var m=parseInt((arr[0]||{}).date||'2000-01').toString();
    return arr.filter(i=>{var mo=parseInt(i.date.split('-')[1]);return mo>=(q-1)*3+1&&mo<=q*3;});}
  var qi=qFilter(inc,_curQ),qe=qFilter(exp,_curQ);
  var iBase=qi.reduce((s,i)=>s+i.base,0);
  var iIva=qi.reduce((s,i)=>s+i.ivaAmt,0);
  var iIrpf=qi.reduce((s,i)=>s+i.irpfAmt,0);
  var eBase=qe.reduce((s,i)=>s+i.base,0);
  var eIva=qe.reduce((s,i)=>s+i.ivaAmt,0);
  var netIva=iIva-eIva;
  var label=_curQ===0?y+'年全年':y+'年 T'+_curQ;
  // IVA by rate
  var ivaByRate={21:{out:0,inp:0},10:{out:0,inp:0},4:{out:0,inp:0},0:{out:0,inp:0}};
  qi.forEach(i=>{if(ivaByRate[i.ivaRate])ivaByRate[i.ivaRate].out+=i.ivaAmt;});
  qe.forEach(i=>{if(ivaByRate[i.ivaRate])ivaByRate[i.ivaRate].inp+=i.ivaAmt;});
  var rateRows=Object.entries(ivaByRate).filter(([r,v])=>v.out||v.inp).map(([r,v])=>'<div class="report-row"><span>IVA '+r+'%</span><span>销项 '+fmt(v.out)+' / 进项 '+fmt(v.inp)+'</span></div>').join('');
  document.getElementById('reportContent').innerHTML=
  '<h3 style="margin-bottom:20px;font-size:18px">📋 '+label+' — 303申报汇总</h3>'+
  '<div class="report-grid">'+
  '<div class="report-card"><h4>📥 销售 (Ventas)</h4>'+
  '<div class="report-row"><span>税前基数</span><span class="amount-pos">'+fmt(iBase)+'</span></div>'+
  '<div class="report-row"><span>IVA 销项税</span><span class="amount-pos">'+fmt(iIva)+'</span></div>'+
  '<div class="report-row"><span>IRPF 预扣</span><span style="color:#7c3aed;font-weight:700">-'+fmt(iIrpf)+'</span></div>'+
  '<div class="report-row total"><span>收款总计</span><span>'+fmt(iBase+iIva-iIrpf)+'</span></div>'+
  '<div style="margin-top:10px;font-size:12px;color:#888">'+qi.length+'张发票</div></div>'+
  '<div class="report-card"><h4>📤 采购 (Compras)</h4>'+
  '<div class="report-row"><span>税前基数</span><span class="amount-neg">'+fmt(eBase)+'</span></div>'+
  '<div class="report-row"><span>IVA 进项税</span><span class="amount-neg">'+fmt(eIva)+'</span></div>'+
  '<div class="report-row total"><span>支出总计</span><span>'+fmt(eBase+eIva)+'</span></div>'+
  '<div style="margin-top:10px;font-size:12px;color:#888">'+qe.length+'张发票</div></div>'+
  '<div class="report-card"><h4>🧾 IVA 303 申报</h4>'+rateRows+
  '<div class="report-row total" style="color:'+(netIva>=0?'#c60b1e':'#16a34a')+'"><span>'+(netIva>=0?'应缴 IVA':'IVA 退税')+'</span><span>'+fmt(Math.abs(netIva))+'</span></div></div>'+
  '<div class="report-card"><h4>📊 收付款统计</h4>'+
  (function(){var bi=0,ci=0,be=0,ce=0;qi.forEach(i=>{if(i.payMethod==='bank')bi+=i.total;else if(i.payMethod==='cash')ci+=i.total;else if(i.payMethod==='both'){bi+=i.bankAmt||0;ci+=i.cashAmt||0;}});qe.forEach(i=>{if(i.payMethod==='bank')be+=i.total;else if(i.payMethod==='cash')ce+=i.total;else if(i.payMethod==='both'){be+=i.bankAmt||0;ce+=i.cashAmt||0;}});return'<div class="report-row"><span>🏦 银行收款</span><span class="amount-pos">'+fmt(bi)+'</span></div><div class="report-row"><span>💵 现金收款</span><span class="amount-pos">'+fmt(ci)+'</span></div><div class="report-row"><span>🏦 银行付款</span><span class="amount-neg">'+fmt(be)+'</span></div><div class="report-row"><span>💵 现金付款</span><span class="amount-neg">'+fmt(ce)+'</span></div><div class="report-row total"><span>净余额</span><span>'+fmt(bi+ci-be-ce)+'</span></div>';})()+'</div></div>'+
  '<div class="form-actions" style="margin-top:0"><button class="btn btn-primary" onclick="printReport()">🖨 打印申报表</button></div>';
}

function toggleModalPay(){var m=document.getElementById('m_pay_method').value;document.getElementById('m_bank_grp').style.display=(m==='bank'||m==='both')?'flex':'none';document.getElementById('m_cash_grp').style.display=(m==='cash'||m==='both')?'flex':'none';}
function closeModal(){document.getElementById('payModal').classList.remove('active');}
function savePayment(){
  var inv=DB.invoices.find(i=>i.id===_editId);if(!inv)return;
  var m=document.getElementById('m_pay_method').value;
  inv.payMethod=m;
  inv.payDate=document.getElementById('m_pay_date').value;
  inv.notes=document.getElementById('m_notes').value;
  inv.bankAmt=m==='bank'||m==='both'?parseFloat(document.getElementById('m_bank_amt').value)||0:0;
  inv.cashAmt=m==='cash'||m==='both'?parseFloat(document.getElementById('m_cash_amt').value)||0:0;
  save();closeModal();notify('付款信息已更新！');
  renderIncome();renderExpense();renderDashboard();
}

function delInvoice(id){if(!confirm('确定删除此发票？'))return;DB.invoices=DB.invoices.filter(i=>i.id!==id);save();notify('已删除','warning');renderIncome();renderExpense();renderDashboard();}

function exportData(){var d=JSON.stringify(DB,null,2);var b=new Blob([d],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='IVA备份_'+new Date().toISOString().slice(0,10)+'_'+DB.invoices.length+'条.json';a.click();notify('✅ 数据已导出！共'+DB.invoices.length+'条记录');}
function importData(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.invoices){DB=d;localStorage.setItem('ivaV3',JSON.stringify(DB));markClean();refreshAll();notify('✅ 导入成功！共'+d.invoices.length+'条记录');}else{notify('文件格式错误','error');}}catch(err){notify('导入失败：'+err.message,'error');}};r.readAsText(f);e.target.value='';}

function closeImportHint(){document.getElementById('importHintModal').classList.remove('show');}

load();initYear();renderDashboard();
// 设置今天日期
(function(){var t=new Date().toISOString().slice(0,10);['in_date','in_due','in_pay_date','ex_date','ex_due','ex_pay_date'].forEach(id=>{var el=document.getElementById(id);if(el&&!el.value&&id.includes('date')&&!id.includes('due')&&!id.includes('pay'))el.value=t;});document.getElementById('in_date').value=t;document.getElementById('ex_date').value=t;})();
// 关闭/刷新页面前警告
window.addEventListener('beforeunload',function(e){
  if(_dirty){
    var msg='你有未导出的发票数据！关闭前建议先点"导出备份"保存到文件。';
    e.preventDefault();e.returnValue=msg;return msg;
  }
});
// 启动时提示用户导入备份
(function(){
  var count=DB.invoices.length;
  if(count>0){
    // 有数据，提示用户是否需要从文件导入更新的版本
    document.getElementById('hintCount').textContent=count;
    document.getElementById('importHintModal').classList.add('show');
  }
  // 初始状态标记为"已保存"（localStorage里有数据）
  markClean();
  var badge=document.getElementById('saveStatusBadge');
  if(badge){badge.textContent='✅ 已保存(本地)';}
})();
</script></body></html>
